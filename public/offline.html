<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="title" content="InfyBonus">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html {
            background-color: #0d6efd;
            color: white;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .logo {
            font-size: 4em;
        }

        .container {
            width: 80%;
            margin: auto;
            padding-top: 30px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .title {
            margin: 0;
            font-size: 2em;
        }

        .description {
            font-style: italic;
            font-size: 1.2em;
        }

        .link {
            color: white;
            text-decoration-line: none;
            padding: 15px;
            background-color: blue;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }

        .link:hover {
            transition: 0.3s;
            background-color: black;
        }
    </style>
</head>

<body class="container">
    <div>
        <div>
            <h1 class="logo">(ㅠ﹏ㅠ)</h1>
            <h2 class="title">Boo! You don't have an internet connection</h2>
            <p class="description">
                Please check your network connection and try again.
            </p>
            <a class="link" href="/">Back to Home Page</a>
        </div>
    </div>
</body>

</html>
